server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend services using k8s DNS
    location /api/events/ {
        proxy_pass http://event-service:8080/events/;
        proxy_set_header Host $host;
    }

    location /api/bookings/ {
        proxy_pass http://booking-service:8081/bookings/;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
