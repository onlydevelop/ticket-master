# Template — do NOT commit real values. Populate manually or via CI.
#
# To create the DB credentials secret:
#   kubectl -n ticket-master create secret generic db-credentials \
#     --from-literal=password=<DB_PASSWORD> \
#     --from-literal=dsn=postgresql://ticketmaster:<DB_PASSWORD>@postgres:5432/ticketmaster
#
# To create the GHCR image pull secret (needed because the package is private):
#   kubectl -n ticket-master create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<GITHUB_USER> \
#     --docker-password=<PAT_WITH_READ_PACKAGES>
#
# Both secrets must exist before applying the service deployments.
