apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booking-service
  namespace: ticket-master
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - http:
        paths:
          - path: /bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 8081
