apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-service
  namespace: ticket-master
  annotations:
    # userdata.sh installs NGINX ingress with hostNetwork; use nginx not traefik
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: event-service
                port:
                  number: 8080
