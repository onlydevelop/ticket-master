name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/onlydevelop/ticket-master

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ticketmaster
          POSTGRES_USER: ticketmaster
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticketmaster"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run migrations
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xz
          ./migrate -path service/migrations \
            -database "postgresql://ticketmaster:secret@localhost:5432/ticketmaster?sslmode=disable" up
        env:
          TEST_DATABASE_URL: postgresql://ticketmaster:secret@localhost:5432/ticketmaster?sslmode=disable

      - name: Test event-service
        working-directory: service/event-service
        run: go test -race ./...
        env:
          TEST_DATABASE_URL: postgresql://ticketmaster:secret@localhost:5432/ticketmaster?sslmode=disable

      - name: Test booking-service
        working-directory: service/booking-service
        run: go test -race ./...
        env:
          TEST_DATABASE_URL: postgresql://ticketmaster:secret@localhost:5432/ticketmaster?sslmode=disable

  build-push:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push event-service
        uses: docker/build-push-action@v6
        with:
          context: service/event-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/event-service:latest
            ${{ env.IMAGE_PREFIX }}/event-service:sha-${{ github.sha }}

      - name: Build and push booking-service
        uses: docker/build-push-action@v6
        with:
          context: service/booking-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/booking-service:latest
            ${{ env.IMAGE_PREFIX }}/booking-service:sha-${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-push
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /home/runner/.kube/config

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p /home/runner/.kube
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "ERROR: KUBECONFIG_B64 secret is not set"; exit 1
          fi
          echo "$KUBECONFIG_B64" | base64 -d > /home/runner/.kube/config
          chmod 600 /home/runner/.kube/config
          echo "Config written ($(wc -c < /home/runner/.kube/config) bytes)"
          grep "server:" /home/runner/.kube/config
          kubectl cluster-info

      - name: Create namespace
        run: kubectl apply -f service/k8s/shared/namespace.yaml

      - name: Sync db-credentials secret
        run: |
          kubectl -n ticket-master create secret generic db-credentials \
            --from-literal=password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=dsn="postgresql://ticketmaster:${{ secrets.DB_PASSWORD }}@postgres:5432/ticketmaster" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync ghcr-pull-secret
        run: |
          kubectl -n ticket-master create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync migrations ConfigMap
        run: |
          kubectl -n ticket-master create configmap db-migrations \
            --from-file=service/migrations/ \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy postgres and wait
        run: |
          kubectl apply -f service/k8s/postgres/
          kubectl -n ticket-master rollout status deployment/postgres --timeout=120s

      - name: Run database migrations
        run: |
          # Jobs are immutable; delete the previous run before reapplying
          kubectl -n ticket-master delete job db-migrate --ignore-not-found
          kubectl apply -f service/k8s/shared/migrate-job.yaml
          kubectl -n ticket-master wait --for=condition=complete job/db-migrate --timeout=120s

      - name: Deploy services
        run: |
          kubectl apply -f service/k8s/event-service/
          kubectl apply -f service/k8s/booking-service/
          kubectl -n ticket-master rollout restart deployment/event-service deployment/booking-service
          kubectl -n ticket-master rollout status deployment/event-service --timeout=120s
          kubectl -n ticket-master rollout status deployment/booking-service --timeout=120s
